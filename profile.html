<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg': 'var(--cp-bg)',
            'cp-surface': 'var(--cp-surface)',
            'cp-border': 'var(--cp-border)',
            'cp-green': 'var(--cp-green)',
            'cp-green-dark': '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
  <script>
    if (localStorage.getItem('cp-theme') !== 'light') document.documentElement.classList.add('dark');
  </script>
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full px-8 py-4 border-b border-cp-border flex items-center gap-4 md:gap-6">
    <a href="browse.html"
      class="text-xl font-bold tracking-wide text-cp-green hover:opacity-80 transition-opacity">CheckPoint</a>
    <div class="hidden md:flex items-center gap-5 text-sm">
      <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
      <a href="favorites.html" class="hover:text-cp-green transition-colors">Favorites</a>
      <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
      <a href="profile.html" class="text-cp-green font-medium">Profile</a>
    </div>
    <div class="flex items-center gap-3 ml-auto">
      <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors"
        aria-label="Toggle dark mode">🌙</button>
      <div id="nav-avatar"></div>
      <button type="button" id="logout-btn"
        class="cursor-pointer text-sm bg-cp-green-dark hover:bg-cp-green-hover text-white px-3 py-1.5 rounded-lg transition-colors">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-8 py-8 max-w-3xl mx-auto w-full">
    <div class="flex justify-center py-12">
      <div class="w-8 h-8 border-2 border-cp-green border-t-transparent rounded-full animate-spin"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { requireAuth, updateDisplayName } from './js/auth.js';
    import {
      getUserProfile, updateUserProfile,
      getFavoritesCount, getLibraryCount
    } from './js/db.js';
    import { renderAvatar, initNavAvatar, showToast } from './js/ui.js';
    import { initDarkMode } from './js/darkmode.js';

    initDarkMode();

    requireAuth(async user => {
      const main = document.querySelector('main');

      let profile, favCount, libCount;
      try {
        [profile, favCount, libCount] = await Promise.all([
          getUserProfile(user.uid),
          getFavoritesCount(user.uid),
          getLibraryCount(user.uid)
        ]);
      } catch (err) {
        console.error(err);
        main.innerHTML = '<p class="text-red-400">Failed to load profile. Please try refreshing.</p>';
        return;
      }

      const displayName = profile?.displayName || 'Anonymous';
      initNavAvatar(displayName);
      const status = profile?.status || '';
      const memberSince = profile?.createdAt?.toDate
        ? profile.createdAt.toDate().toLocaleDateString('en-US', { year: 'numeric', month: 'long' })
        : '';

      main.innerHTML = `
        <h1 class="text-2xl font-bold mb-8">My Profile</h1>

        <!-- Profile header -->
        <div class="flex items-center gap-6 mb-8">
          <div id="profile-avatar"></div>
          <div>
            <p class="text-xl font-bold" id="profile-name"></p>
            ${memberSince ? `<p class="text-gray-500 text-sm mt-0.5">Member since ${memberSince}</p>` : ''}
            <p class="text-gray-400 text-sm mt-1" id="profile-status"></p>
          </div>
        </div>

        <!-- Stats -->
        <div class="flex gap-8 mb-8 p-5 bg-cp-surface border border-cp-border rounded-xl">
          <div class="text-center">
            <p class="text-2xl font-bold text-cp-green">${favCount}</p>
            <p class="text-xs text-gray-500 mt-0.5">Favorites</p>
          </div>
          <div class="text-center">
            <p class="text-2xl font-bold text-cp-green">${libCount}</p>
            <p class="text-xs text-gray-500 mt-0.5">Library</p>
          </div>
        </div>

        <!-- Edit form -->
        <div class="bg-cp-surface border border-cp-border rounded-xl p-5">
          <h2 class="font-semibold mb-4">Edit Profile</h2>

          <label class="block text-sm text-gray-400 mb-1">Display Name</label>
          <input id="edit-name" type="text" maxlength="40"
            class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-4" />

          <label class="block text-sm text-gray-400 mb-1">Bio</label>
          <input id="edit-status" type="text" maxlength="120" placeholder="A short bio (optional)"
            class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-4" />

          <button type="button" id="save-profile"
            class="cursor-pointer bg-cp-green-dark hover:bg-cp-green-hover text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
            Save Changes
          </button>
          <p id="save-msg" class="text-sm mt-2 min-h-[1.25rem]"></p>
        </div>
      `;

      // Populate display-only fields via textContent to prevent XSS
      document.getElementById('profile-name').textContent = displayName;
      document.getElementById('profile-status').textContent = status;
      document.getElementById('profile-avatar').appendChild(renderAvatar(displayName, 64));

      // Pre-fill the edit form with current values
      document.getElementById('edit-name').value = displayName;
      document.getElementById('edit-status').value = status;

      // ── Save handler ────────────────────────────────────────────────────
      document.getElementById('save-profile').addEventListener('click', async () => {
        const newName = document.getElementById('edit-name').value.trim();
        const newStatus = document.getElementById('edit-status').value.trim();
        const saveMsg = document.getElementById('save-msg');
        const saveBtn = document.getElementById('save-profile');

        if (!newName) { saveMsg.className = 'text-red-400 text-sm mt-2 min-h-[1.25rem]'; saveMsg.textContent = 'Display name cannot be empty.'; return; }

        saveBtn.disabled = true;
        saveMsg.textContent = '';
        try {
          // Update both Firestore and Firebase Auth so every page stays in sync
          await Promise.all([
            updateUserProfile(user.uid, { displayName: newName, status: newStatus }),
            updateDisplayName(user, newName)
          ]);
          // Refresh the big profile avatar
          document.getElementById('profile-name').textContent = newName;
          document.getElementById('profile-status').textContent = newStatus;
          document.getElementById('profile-avatar').innerHTML = '';
          document.getElementById('profile-avatar').appendChild(renderAvatar(newName, 64));
          // Refresh the navbar avatar to match immediately
          const navAvatarEl = document.getElementById('nav-avatar');
          if (navAvatarEl) {
            navAvatarEl.innerHTML = '';
            navAvatarEl.appendChild(renderAvatar(newName, 36));
          }
          showToast('Profile updated!');
        } catch (err) {
          console.error('Failed to update profile:', err);
          showToast('Failed to save. Please try again.', 'error');
        } finally {
          saveBtn.disabled = false;
        }
      });
    });
  </script>

</body>

</html>
