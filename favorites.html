<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites — CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg': 'var(--cp-bg)',
            'cp-surface': 'var(--cp-surface)',
            'cp-border': 'var(--cp-border)',
            'cp-green': 'var(--cp-green)',
            'cp-green-dark': '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
  <script>
    if (localStorage.getItem('cp-theme') !== 'light') document.documentElement.classList.add('dark');
  </script>
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full border-b border-cp-border">
    <div class="px-8 py-4 flex items-center gap-4 md:gap-6">
      <a href="browse.html"
        class="text-xl font-bold tracking-wide text-cp-green hover:opacity-80 transition-opacity">CheckPoint</a>
      <div class="hidden md:flex items-center gap-5 text-sm">
        <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
        <a href="favorites.html" class="text-cp-green font-medium">Favorites</a>
        <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
        <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
      </div>
      <div class="flex items-center gap-3 ml-auto">
        <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors"
          aria-label="Toggle dark mode">🌙</button>
        <div id="nav-avatar"></div>
        <button type="button" id="logout-btn"
          class="cursor-pointer text-sm bg-cp-green-dark hover:bg-cp-green-hover text-white px-3 py-1.5 rounded-lg transition-colors">Logout</button>
        <button type="button" id="hamburger-btn" class="md:hidden cursor-pointer hover:text-cp-green transition-colors" aria-label="Toggle menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden border-t border-cp-border bg-cp-surface px-8 py-4 flex-col gap-4 text-sm">
      <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
      <a href="favorites.html" class="text-cp-green font-medium">Favorites</a>
      <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
      <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
    </div>
  </nav>
  <script>
    document.getElementById('hamburger-btn').addEventListener('click', () => {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
      menu.classList.toggle('flex');
    });
  </script>

  <!-- Main -->
  <main class="flex-1 px-8 py-8 max-w-7xl mx-auto w-full">
    <h1 class="text-2xl font-bold mb-6">My Favorites</h1>
    <div id="favorites-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      <!-- Cards rendered below -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { getFavorites, toggleFavorite, getUserProfile } from './js/db.js';
    import { initNavAvatar, showToast } from './js/ui.js';
    import { initDarkMode } from './js/darkmode.js';

    initDarkMode();

    requireAuth(async user => {
      getUserProfile(user.uid).then(p => initNavAvatar(p?.displayName || user.displayName || 'User'));

      const grid = document.getElementById('favorites-grid');

      // Show spinner while loading
      grid.innerHTML = `
        <div class="col-span-full flex justify-center py-12">
          <div class="w-8 h-8 border-2 border-cp-green border-t-transparent rounded-full animate-spin"></div>
        </div>`;

      let favorites = [];
      try {
        favorites = await getFavorites(user.uid);
      } catch (err) {
        console.error('Failed to load favorites:', err);
        grid.innerHTML = '<p class="col-span-full text-center text-red-400 py-12">Failed to load favorites. Please try refreshing.</p>';
        return;
      }

      function renderGrid() {
        grid.innerHTML = '';
        if (favorites.length === 0) {
          grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No favorites yet. Browse games and add some!</p>';
          return;
        }

        favorites.forEach(fav => {
          const card = document.createElement('div');
          card.className = 'group relative bg-cp-surface border border-cp-border rounded-xl overflow-hidden hover:border-cp-green transition-colors';
          card.innerHTML = `
            <a href="game-detail.html?id=${fav.gameId}" class="block">
              <div class="h-28 bg-cp-bg overflow-hidden">
                <img src="${fav.coverImage}" alt="${fav.title.replace(/"/g, '&quot;')}"
                  class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-300"
                  onerror="this.style.display='none'" />
              </div>
              <div class="p-3">
                <p class="font-semibold text-sm leading-tight line-clamp-2">${fav.title}</p>
              </div>
            </a>
            <button type="button" data-id="${fav.gameId}"
              class="remove-btn absolute top-2 right-2 text-xs bg-red-900 hover:bg-red-700 text-white px-2 py-1 rounded-md opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
              ✕
            </button>
          `;
          grid.appendChild(card);
        });

        // Wire remove buttons after rendering
        grid.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', async e => {
            e.preventDefault();
            const gameId = btn.dataset.id;
            btn.disabled = true;
            try {
              // toggleFavorite checks existence first — since it's in favorites, it removes it
              await toggleFavorite(user.uid, gameId, { title: '', coverImage: '' });
              favorites = favorites.filter(f => f.gameId !== gameId);
              renderGrid();
              showToast('Removed from favorites');
            } catch (err) {
              console.error('Failed to remove favorite:', err);
              showToast('Failed to remove', 'error');
              btn.disabled = false;
            }
          });
        });
      }

      renderGrid();
    });
  </script>

</body>

</html>
