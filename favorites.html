<!DOCTYPE html>

<head>

  <title>Favorites — CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg':          '#0a0a0f',
            'cp-surface':     '#111118',
            'cp-border':      '#1e1e2e',
            'cp-green':       '#89f881',
            'cp-green-dark':  '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full px-8 py-4 border-b border-cp-border flex items-center justify-between">
    <a href="browse.html" class="text-xl font-bold tracking-wide text-cp-green hover:opacity-80 transition-opacity">CheckPoint</a>
    <div class="hidden md:flex items-center gap-5 text-sm">
      <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
      <a href="favorites.html" class="text-cp-green font-medium">Favorites</a>
      <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
      <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
    </div>
    <div class="flex items-center gap-3">
      <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors" aria-label="Toggle dark mode">🌙</button>
      <div id="nav-avatar"></div>
      <button type="button" id="logout-btn" class="cursor-pointer text-sm bg-cp-green-dark hover:bg-cp-green-hover text-white px-3 py-1.5 rounded-lg transition-colors">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-8 py-8 max-w-7xl mx-auto w-full">
    <h1 class="text-2xl font-bold mb-6">My Favorites</h1>
    <div id="favorites-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      <!-- Cards rendered by favorites.js -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    requireAuth(user => {

</html>
