<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Detail — CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg': 'var(--cp-bg)',
            'cp-surface': 'var(--cp-surface)',
            'cp-border': 'var(--cp-border)',
            'cp-green': 'var(--cp-green)',
            'cp-green-dark': '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
  <script>
    if (localStorage.getItem('cp-theme') !== 'light') document.documentElement.classList.add('dark');
  </script>
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full border-b border-cp-border">
    <div class="px-8 py-4 flex items-center gap-4 md:gap-6">
      <a href="browse.html"
        class="text-xl font-bold tracking-wide text-cp-green hover:opacity-80 transition-opacity">CheckPoint</a>
      <div class="hidden md:flex items-center gap-5 text-sm">
        <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
        <a href="favorites.html" class="hover:text-cp-green transition-colors">Favorites</a>
        <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
        <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
      </div>
      <div class="flex items-center gap-3 ml-auto">
        <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors"
          aria-label="Toggle dark mode">🌙</button>
        <div id="nav-avatar"></div>
        <button type="button" id="logout-btn"
          class="cursor-pointer text-sm bg-cp-green-dark hover:bg-cp-green-hover text-white px-3 py-1.5 rounded-lg transition-colors">Logout</button>
        <button type="button" id="hamburger-btn" class="md:hidden cursor-pointer hover:text-cp-green transition-colors" aria-label="Toggle menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden border-t border-cp-border bg-cp-surface px-8 py-4 flex-col gap-4 text-sm">
      <a href="browse.html" class="hover:text-cp-green transition-colors">Browse</a>
      <a href="favorites.html" class="hover:text-cp-green transition-colors">Favorites</a>
      <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
      <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
    </div>
  </nav>
  <script>
    document.getElementById('hamburger-btn').addEventListener('click', () => {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
      menu.classList.toggle('flex');
    });
  </script>

  <!-- Main — content injected by script below -->
  <main class="flex-1 px-8 py-8 max-w-4xl mx-auto w-full">
    <div class="flex justify-center py-12">
      <div class="w-8 h-8 border-2 border-cp-green border-t-transparent rounded-full animate-spin"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import {
      getGame, toggleFavorite, isFavorited, setGameStatus, getGameStatus,
      getUserProfile, getReviews, submitReview
    } from './js/db.js';
    import { renderAvatar, initNavAvatar, showToast } from './js/ui.js';
    import { initDarkMode } from './js/darkmode.js';

    initDarkMode();

    requireAuth(async user => {
      const main = document.querySelector('main');
      const params = new URLSearchParams(window.location.search);
      const gameId = params.get('id');

      if (!gameId) {
        window.location.href = 'browse.html';
        return;
      }

      let game, favorited, status, userProfile;
      try {
        [game, favorited, status, userProfile] = await Promise.all([
          getGame(gameId),
          isFavorited(user.uid, gameId),
          getGameStatus(user.uid, gameId),
          getUserProfile(user.uid)
        ]);
      } catch (err) {
        console.error(err);
        main.innerHTML = '<p class="text-red-400">Failed to load game. Please try refreshing.</p>';
        return;
      }

      // Nav avatar uses the Firestore profile already fetched above — no extra read
      initNavAvatar(userProfile?.displayName || user.displayName || 'User');

      if (!game) {
        main.innerHTML = '<p class="text-red-400">Game not found.</p>';
        return;
      }

      const displayName = userProfile?.displayName || 'Anonymous';

      main.innerHTML = `
        <a href="browse.html" class="text-sm text-gray-500 hover:text-cp-green transition-colors mb-6 inline-block">← Back to Browse</a>

        <div class="flex flex-col sm:flex-row gap-6 mb-8">
          <img
            src="${game.coverImage}"
            alt="${game.title}"
            class="w-full sm:w-72 rounded-xl border border-cp-border object-cover object-top"
            onerror="this.style.display='none'"
          />
          <div class="flex-1">
            <h1 class="text-3xl font-extrabold mb-3">${game.title}</h1>
            <div class="flex flex-wrap gap-2 mb-4">
              <span class="text-xs bg-cp-surface border border-cp-border text-cp-green px-2.5 py-1 rounded-full">${game.genre}</span>
              <span class="text-xs bg-cp-surface border border-cp-border text-gray-400 px-2.5 py-1 rounded-full">${game.platform}</span>
              <span class="text-xs bg-cp-surface border border-cp-border text-gray-400 px-2.5 py-1 rounded-full">${game.releaseYear}</span>
            </div>
            <p class="text-gray-400 text-sm leading-relaxed mb-6">${game.description}</p>

            <div class="flex flex-wrap gap-3">
              <button type="button" id="fav-btn"
                class="cursor-pointer px-4 py-2 rounded-lg text-sm font-semibold border transition-colors ${favorited
          ? 'bg-cp-green-dark border-cp-green-dark text-white'
          : 'border-cp-border text-gray-400 hover:border-cp-green hover:text-cp-green'}">
                ${favorited ? '♥ Favorited' : '♡ Add to Favorites'}
              </button>
              <select id="status-select"
                class="cursor-pointer bg-cp-surface border border-cp-border text-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors">
                <option value="">Set Status</option>
                <option value="not_started" ${status === 'not_started' ? 'selected' : ''}>Not Started</option>
                <option value="playing"     ${status === 'playing' ? 'selected' : ''}>Playing</option>
                <option value="played"      ${status === 'played' ? 'selected' : ''}>Played</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Reviews -->
        <div class="border-t border-cp-border pt-8">
          <div class="flex items-center gap-3 mb-6">
            <h2 class="text-lg font-bold">Reviews</h2>
            <span id="avg-rating" class="text-sm text-gray-500"></span>
          </div>

          <div class="bg-cp-surface border border-cp-border rounded-xl p-5 mb-8">
            <p class="text-sm font-semibold mb-3">Write a Review</p>
            <div id="star-picker" class="flex gap-2 mb-3">
              ${[1, 2, 3, 4, 5].map(n => `<button type="button" data-star="${n}" class="star-btn text-2xl cursor-pointer text-gray-600 transition-colors">★</button>`).join('')}
            </div>
            <textarea id="review-text" placeholder="Share your thoughts..." rows="3"
              class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors resize-none mb-3"></textarea>
            <button type="button" id="submit-review"
              class="cursor-pointer bg-cp-green-dark hover:bg-cp-green-hover text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
              Submit Review
            </button>
            <p id="review-error" class="text-red-400 text-sm mt-2 min-h-[1.25rem]"></p>
          </div>

          <div id="reviews-list"></div>
        </div>
      `;

      // ── Favorite button ──────────────────────────────────────────────────
      const favBtn = document.getElementById('fav-btn');
      favBtn.addEventListener('click', async () => {
        favBtn.disabled = true;
        try {
          favorited = await toggleFavorite(user.uid, gameId, game);
          favBtn.textContent = favorited ? '♥ Favorited' : '♡ Add to Favorites';
          favBtn.className = `cursor-pointer px-4 py-2 rounded-lg text-sm font-semibold border transition-colors ${favorited
            ? 'bg-cp-green-dark border-cp-green-dark text-white'
            : 'border-cp-border text-gray-400 hover:border-cp-green hover:text-cp-green'}`;
          showToast(favorited ? 'Added to favorites ♥' : 'Removed from favorites');
        } catch (err) {
          console.error('Failed to toggle favorite:', err);
          showToast('Failed to update favorite', 'error');
        } finally {
          favBtn.disabled = false;
        }
      });

      // ── Status dropdown ──────────────────────────────────────────────────
      const statusSelect = document.getElementById('status-select');
      statusSelect.addEventListener('change', async () => {
        const newStatus = statusSelect.value;
        if (!newStatus) return;
        try {
          await setGameStatus(user.uid, gameId, newStatus, game);
          showToast('Status updated');
        } catch (err) {
          console.error('Failed to set status:', err);
          showToast('Failed to update status', 'error');
        }
      });

      // ── Star picker ──────────────────────────────────────────────────────
      let selectedRating = 0;
      const starBtns = document.querySelectorAll('.star-btn');
      const reviewError = document.getElementById('review-error');

      function updateStars() {
        starBtns.forEach(btn => {
          btn.style.color = parseInt(btn.dataset.star) <= selectedRating ? '#89f881' : '#4b5563';
        });
      }

      starBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          selectedRating = parseInt(btn.dataset.star);
          updateStars();
        });
      });

      // ── Load and render reviews ──────────────────────────────────────────
      async function loadReviews() {
        const reviews = await getReviews(gameId);
        const avgEl = document.getElementById('avg-rating');
        const listEl = document.getElementById('reviews-list');

        if (reviews.length === 0) {
          avgEl.textContent = 'No reviews yet';
          listEl.innerHTML = '<p class="text-gray-500 text-sm">Be the first to review this game.</p>';
        } else {
          const avg = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
          avgEl.innerHTML = `<span style="color:#89f881">★</span> ${avg.toFixed(1)} <span class="text-gray-500">(${reviews.length} review${reviews.length !== 1 ? 's' : ''})</span>`;

          listEl.innerHTML = '';
          reviews.forEach(review => {
            const row = document.createElement('div');
            row.className = 'flex gap-4 py-4 border-b border-cp-border last:border-b-0';
            row.appendChild(renderAvatar(review.displayName, 36));

            const body = document.createElement('div');
            body.className = 'flex-1 min-w-0';

            const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
            const date = review.timestamp?.toDate ? review.timestamp.toDate().toLocaleDateString() : '';

            const header = document.createElement('div');
            header.className = 'flex flex-wrap items-center gap-2 mb-1';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'font-semibold text-sm';
            nameSpan.textContent = review.displayName;

            const starsSpan = document.createElement('span');
            starsSpan.className = 'text-cp-green text-sm';
            starsSpan.textContent = stars;

            const dateSpan = document.createElement('span');
            dateSpan.className = 'text-gray-500 text-xs';
            dateSpan.textContent = date;

            header.appendChild(nameSpan);
            header.appendChild(starsSpan);
            header.appendChild(dateSpan);

            const textP = document.createElement('p');
            textP.className = 'text-gray-400 text-sm';
            textP.textContent = review.text;

            body.appendChild(header);
            body.appendChild(textP);
            row.appendChild(body);
            listEl.appendChild(row);
          });
        }

        // Pre-fill form if the user already has a review
        const myReview = reviews.find(r => r.id === user.uid);
        if (myReview) {
          selectedRating = myReview.rating;
          document.getElementById('review-text').value = myReview.text;
          updateStars();
        }
      }

      // ── Submit review ────────────────────────────────────────────────────
      document.getElementById('submit-review').addEventListener('click', async () => {
        reviewError.textContent = '';
        if (!selectedRating) { reviewError.textContent = 'Please select a star rating.'; return; }
        const text = document.getElementById('review-text').value.trim();
        if (!text) { reviewError.textContent = 'Please write a review.'; return; }

        const submitBtn = document.getElementById('submit-review');
        submitBtn.disabled = true;
        try {
          await submitReview(user.uid, gameId, { rating: selectedRating, text, displayName });
          await loadReviews();
          showToast('Review saved!');
        } catch (err) {
          console.error('Failed to submit review:', err);
          reviewError.textContent = 'Failed to submit. Please try again.';
          showToast('Failed to submit review', 'error');
        } finally {
          submitBtn.disabled = false;
        }
      });

      await loadReviews();
    });
  </script>

</body>

</html>
