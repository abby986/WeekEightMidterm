<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg': 'var(--cp-bg)',
            'cp-surface': 'var(--cp-surface)',
            'cp-border': 'var(--cp-border)',
            'cp-green': 'var(--cp-green)',
            'cp-green-dark': '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
  <script>
    if (localStorage.getItem('cp-theme') !== 'light') document.documentElement.classList.add('dark');
  </script>
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full border-b border-cp-border">
    <div class="px-8 py-4 flex items-center gap-4 md:gap-6">
      <a href="index.html"
        class="text-xl font-bold tracking-wide text-cp-green shrink-0 hover:opacity-80 transition-opacity">CheckPoint</a>
      <div class="hidden md:flex items-center gap-5 text-sm shrink-0">
        <a href="browse.html" class="text-cp-green font-medium">Browse</a>
        <a href="favorites.html" class="hover:text-cp-green transition-colors">Favorites</a>
        <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
        <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
      </div>
      <input id="search-bar" type="text" placeholder="Search games..."
        class="flex-1 bg-cp-surface text-gray-200 placeholder-gray-500 px-4 py-1.5 rounded-lg text-sm outline-none border border-cp-border focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors" />
      <div class="flex items-center gap-3 shrink-0">
        <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors"
          aria-label="Toggle dark mode">🌙</button>
        <div id="nav-avatar"></div>
        <button type="button" id="logout-btn"
          class="cursor-pointer text-sm bg-cp-green-dark hover:bg-cp-green-hover text-white px-3 py-1.5 rounded-lg transition-colors">Logout</button>
        <button type="button" id="hamburger-btn" class="md:hidden cursor-pointer hover:text-cp-green transition-colors" aria-label="Toggle menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden border-t border-cp-border bg-cp-surface px-8 py-4 flex-col gap-4 text-sm">
      <a href="browse.html" class="text-cp-green font-medium">Browse</a>
      <a href="favorites.html" class="hover:text-cp-green transition-colors">Favorites</a>
      <a href="library.html" class="hover:text-cp-green transition-colors">Library</a>
      <a href="profile.html" class="hover:text-cp-green transition-colors">Profile</a>
    </div>
  </nav>
  <script>
    document.getElementById('hamburger-btn').addEventListener('click', () => {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
      menu.classList.toggle('flex');
    });
  </script>

  <!-- Main -->
  <main class="flex-1 px-8 py-8 max-w-7xl mx-auto w-full">
    <h1 class="text-2xl font-bold mb-6">Browse Games</h1>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-6">
      <select id="genre-filter"
        class="bg-cp-surface border border-cp-border text-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors">
        <option value="">All Genres</option>
      </select>
      <select id="platform-filter"
        class="bg-cp-surface border border-cp-border text-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors">
        <option value="">All Platforms</option>
      </select>
      <select id="sort-filter"
        class="bg-cp-surface border border-cp-border text-gray-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors">
        <option value="az">A–Z</option>
        <option value="za">Z–A</option>
        <option value="rating">Top Rated</option>
        <option value="newest">Newest</option>
      </select>
    </div>

    <!-- Game Grid -->
    <div id="game-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      <!-- Cards rendered by browse.js -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { getAllGames, getUserProfile } from './js/db.js';
    import { renderGameCard, initNavAvatar } from './js/ui.js';
    import { filterAndSort, debounce } from './js/browse.js';
    import { initDarkMode } from './js/darkmode.js';

    initDarkMode();

    requireAuth(async user => {
      // Fetch Firestore profile for the nav avatar — keeps it consistent with
      // the profile page regardless of what Firebase Auth's user.displayName holds.
      getUserProfile(user.uid).then(p => initNavAvatar(p?.displayName || user.displayName || 'User'));
      const grid = document.getElementById('game-grid');
      const searchInput = document.getElementById('search-bar');
      const genreSelect = document.getElementById('genre-filter');
      const platformSelect = document.getElementById('platform-filter');
      const sortSelect = document.getElementById('sort-filter');

      // Show spinner while Firestore fetch is in progress
      grid.innerHTML = `
        <div class="col-span-full flex justify-center py-12">
          <div class="w-8 h-8 border-2 border-cp-green border-t-transparent rounded-full animate-spin"></div>
        </div>`;

      let allGames = [];
      try {
        allGames = await getAllGames();
      } catch (err) {
        console.error('Failed to load games:', err);
        grid.innerHTML = '<p class="col-span-full text-center text-red-400 py-12">Failed to load games. Please try refreshing.</p>';
        return;
      }

      // Populate genre dropdown from unique genres, sorted A-Z
      const genres = [...new Set(allGames.map(g => g.genre))].sort();
      genres.forEach(genre => {
        const opt = document.createElement('option');
        opt.value = genre;
        opt.textContent = genre;
        genreSelect.appendChild(opt);
      });

      // Populate platform dropdown by splitting each game's platform string on " / "
      // e.g. "PC / PS5 / Xbox" → ["PC", "PS5", "Xbox"]
      const platforms = [...new Set(allGames.flatMap(g => g.platform.split(' / ')))].sort();
      platforms.forEach(platform => {
        const opt = document.createElement('option');
        opt.value = platform;
        opt.textContent = platform;
        platformSelect.appendChild(opt);
      });

      // Re-filter and re-render the grid based on current control values
      function renderGrid() {
        const filtered = filterAndSort(allGames, {
          query: searchInput.value,
          genre: genreSelect.value,
          platform: platformSelect.value,
          sort: sortSelect.value,
        });

        grid.innerHTML = '';
        if (filtered.length === 0) {
          grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No games match your search.</p>';
          return;
        }
        filtered.forEach(game => grid.appendChild(renderGameCard(game)));
      }

      // Initial render — shows all games sorted A-Z
      renderGrid();

      // Search is debounced so the grid doesn't re-render on every keystroke
      searchInput.addEventListener('input', debounce(renderGrid, 300));

      // Selects fire immediately — the user already made a deliberate choice
      genreSelect.addEventListener('change', renderGrid);
      platformSelect.addEventListener('change', renderGrid);
      sortSelect.addEventListener('change', renderGrid);
    });
  </script>

</body>

</html>
