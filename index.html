<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckPoint Game Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cp-bg':          '#0a0a0f',
            'cp-surface':     '#111118',
            'cp-border':      '#1e1e2e',
            'cp-green':       '#89f881',
            'cp-green-dark':  '#3a8d34',
            'cp-green-hover': '#1e551a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bg-cp-bg text-gray-200 min-h-screen flex flex-col font-sans">

  <!-- Navbar -->
  <nav class="w-full px-8 py-4 border-b border-cp-border flex items-center justify-between">
    <span class="text-xl font-bold tracking-wide text-cp-green">CheckPoint</span>
    <button type="button" id="dark-mode-toggle" class="cursor-pointer hover:text-cp-green transition-colors" aria-label="Toggle dark mode">🌙</button>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex flex-col items-center justify-center px-6 py-12 gap-8">

    <!-- Hero -->
    <div class="text-center max-w-xl">
      <h1 class="text-4xl font-extrabold tracking-tight leading-tight mb-3">
        Your Personalized Game Hub, <span class="text-cp-green">Tracked.</span>
      </h1>
      <p class="text-gray-400 text-base leading-relaxed">
        Browse games, track your progress, save favorites, and share reviews — all in one place.
      </p>
    </div>

    <!-- Auth Card -->
    <div class="w-full max-w-sm bg-cp-surface border border-cp-border rounded-xl p-8">

      <!-- Login Form (shown by default) -->
      <div id="login-form">
        <h2 class="text-lg font-bold mb-5">Sign In</h2>
        <input type="email" id="login-email" placeholder="Email" autocomplete="email"
          class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-3" />
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password"
          class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-1" />
        <button type="button" id="login-submit"
          class="w-full cursor-pointer bg-cp-green-dark hover:bg-cp-green-hover text-white font-semibold py-2.5 rounded-lg transition-colors mt-4">
          Sign In
        </button>
        <p class="text-sm text-gray-500 text-center mt-4">
          Don't have an account?
          <button type="button" id="show-register" class="cursor-pointer text-cp-green hover:underline">Register</button>
        </p>
      </div>

      <!-- Register Form (hidden by default) -->
      <div id="register-form" class="hidden">
        <h2 class="text-lg font-bold mb-5">Create Account</h2>
        <input type="text" id="reg-name" placeholder="Display Name" autocomplete="name"
          class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-3" />
        <input type="email" id="reg-email" placeholder="Email" autocomplete="email"
          class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-3" />
        <input type="password" id="reg-password" placeholder="Password (min 6 characters)" autocomplete="new-password"
          class="w-full bg-cp-bg border border-cp-border text-gray-200 placeholder-gray-500 px-4 py-2.5 rounded-lg text-sm outline-none focus:border-cp-green focus:ring-1 focus:ring-cp-green transition-colors mb-1" />
        <button type="button" id="register-submit"
          class="w-full cursor-pointer bg-cp-green-dark hover:bg-cp-green-hover text-white font-semibold py-2.5 rounded-lg transition-colors mt-4">
          Create Account
        </button>
        <p class="text-sm text-gray-500 text-center mt-4">
          Already have an account?
          <button type="button" id="show-login" class="cursor-pointer text-cp-green hover:underline">Sign In</button>
        </p>
      </div>

      <!-- Error message (shared between both forms) -->
      <p id="auth-error" class="text-red-400 text-sm text-center mt-3 min-h-[1.25rem]"></p>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-8 py-4 text-center text-sm text-gray-600 border-t border-cp-border">
    &copy; 2026 CheckPoint Game Hub
  </footer>

  <script type="module">
    import { registerUser, loginUser, redirectIfLoggedIn, friendlyError } from './js/auth.js';

    // If user is already logged in, skip this page
    redirectIfLoggedIn();

    const loginForm    = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const errorMsg     = document.getElementById('auth-error');

    function clearError() { errorMsg.textContent = ''; }
    function showError(msg) { errorMsg.textContent = msg; }

    // Toggle between forms
    document.getElementById('show-register').addEventListener('click', () => {
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      clearError();
    });

    document.getElementById('show-login').addEventListener('click', () => {
      registerForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      clearError();
    });

    // Login submission
    document.getElementById('login-submit').addEventListener('click', async () => {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      clearError();
      if (!email)    { showError('Please enter your email.'); return; }
      if (!password) { showError('Please enter your password.'); return; }
      try {
        await loginUser(email, password);
        window.location.href = 'browse.html';
      } catch (err) {
        showError(friendlyError(err.code));
      }
    });

    // Register submission
    document.getElementById('register-submit').addEventListener('click', async () => {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      clearError();
      if (!name) { showError('Please enter a display name.'); return; }
      try {
        await registerUser(email, password, name);
        window.location.href = 'browse.html';
      } catch (err) {
        showError(friendlyError(err.code));
      }
    });
  </script>

</body>

</html>
